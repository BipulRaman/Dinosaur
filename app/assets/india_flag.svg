<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <!-- Tricolour bands (3:2 ratio) -->
  <rect x="0" y="0"   width="900" height="200" fill="#FF9933"/>
  <rect x="0" y="200" width="900" height="200" fill="#FFFFFF"/>
  <rect x="0" y="400" width="900" height="200" fill="#138808"/>

  <!-- Ashoka Chakra: navy #000080, centred on the white band -->
  <g transform="translate(450,300)" fill="#000080" stroke="#000080">
    <!-- Outer rim -->
    <circle r="92" fill="none" stroke-width="9"/>
    <!-- Hub -->
    <circle r="17.5" stroke="none"/>

    <!-- 24 spokes, each a thin spindle, at 15° steps -->
    <g stroke="none">
      <g>
        <path d="M0,-86 L3.2,-20 L0,0 L-3.2,-20 Z"/>
      </g>
      <g transform="rotate(15)"><path d="M0,-86 L3.2,-20 L0,0 L-3.2,-20 Z"/></g>
      <g transform="rotate(30)"><path d="M0,-86 L3.2,-20 L0,0 L-3.2,-20 Z"/></g>
      <g transform="rotate(45)"><path d="M0,-86 L3.2,-20 L0,0 L-3.2,-20 Z"/></g>
      <g transform="rotate(60)"><path d="M0,-86 L3.2,-20 L0,0 L-3.2,-20 Z"/></g>
      <g transform="rotate(75)"><path d="M0,-86 L3.2,-20 L0,0 L-3.2,-20 Z"/></g>
      <g transform="rotate(90)"><path d="M0,-86 L3.2,-20 L0,0 L-3.2,-20 Z"/></g>
      <g transform="rotate(105)"><path d="M0,-86 L3.2,-20 L0,0 L-3.2,-20 Z"/></g>
      <g transform="rotate(120)"><path d="M0,-86 L3.2,-20 L0,0 L-3.2,-20 Z"/></g>
      <g transform="rotate(135)"><path d="M0,-86 L3.2,-20 L0,0 L-3.2,-20 Z"/></g>
      <g transform="rotate(150)"><path d="M0,-86 L3.2,-20 L0,0 L-3.2,-20 Z"/></g>
      <g transform="rotate(165)"><path d="M0,-86 L3.2,-20 L0,0 L-3.2,-20 Z"/></g>
      <g transform="rotate(180)"><path d="M0,-86 L3.2,-20 L0,0 L-3.2,-20 Z"/></g>
      <g transform="rotate(195)"><path d="M0,-86 L3.2,-20 L0,0 L-3.2,-20 Z"/></g>
      <g transform="rotate(210)"><path d="M0,-86 L3.2,-20 L0,0 L-3.2,-20 Z"/></g>
      <g transform="rotate(225)"><path d="M0,-86 L3.2,-20 L0,0 L-3.2,-20 Z"/></g>
      <g transform="rotate(240)"><path d="M0,-86 L3.2,-20 L0,0 L-3.2,-20 Z"/></g>
      <g transform="rotate(255)"><path d="M0,-86 L3.2,-20 L0,0 L-3.2,-20 Z"/></g>
      <g transform="rotate(270)"><path d="M0,-86 L3.2,-20 L0,0 L-3.2,-20 Z"/></g>
      <g transform="rotate(285)"><path d="M0,-86 L3.2,-20 L0,0 L-3.2,-20 Z"/></g>
      <g transform="rotate(300)"><path d="M0,-86 L3.2,-20 L0,0 L-3.2,-20 Z"/></g>
      <g transform="rotate(315)"><path d="M0,-86 L3.2,-20 L0,0 L-3.2,-20 Z"/></g>
      <g transform="rotate(330)"><path d="M0,-86 L3.2,-20 L0,0 L-3.2,-20 Z"/></g>
      <g transform="rotate(345)"><path d="M0,-86 L3.2,-20 L0,0 L-3.2,-20 Z"/></g>
    </g>

    <!-- 24 rim spindle-dots, offset 7.5° between spokes -->
    <g stroke="none">
      <g transform="rotate(7.5)"><circle cx="0" cy="-80" r="4.5"/></g>
      <g transform="rotate(22.5)"><circle cx="0" cy="-80" r="4.5"/></g>
      <g transform="rotate(37.5)"><circle cx="0" cy="-80" r="4.5"/></g>
      <g transform="rotate(52.5)"><circle cx="0" cy="-80" r="4.5"/></g>
      <g transform="rotate(67.5)"><circle cx="0" cy="-80" r="4.5"/></g>
      <g transform="rotate(82.5)"><circle cx="0" cy="-80" r="4.5"/></g>
      <g transform="rotate(97.5)"><circle cx="0" cy="-80" r="4.5"/></g>
      <g transform="rotate(112.5)"><circle cx="0" cy="-80" r="4.5"/></g>
      <g transform="rotate(127.5)"><circle cx="0" cy="-80" r="4.5"/></g>
      <g transform="rotate(142.5)"><circle cx="0" cy="-80" r="4.5"/></g>
      <g transform="rotate(157.5)"><circle cx="0" cy="-80" r="4.5"/></g>
      <g transform="rotate(172.5)"><circle cx="0" cy="-80" r="4.5"/></g>
      <g transform="rotate(187.5)"><circle cx="0" cy="-80" r="4.5"/></g>
      <g transform="rotate(202.5)"><circle cx="0" cy="-80" r="4.5"/></g>
      <g transform="rotate(217.5)"><circle cx="0" cy="-80" r="4.5"/></g>
      <g transform="rotate(232.5)"><circle cx="0" cy="-80" r="4.5"/></g>
      <g transform="rotate(247.5)"><circle cx="0" cy="-80" r="4.5"/></g>
      <g transform="rotate(262.5)"><circle cx="0" cy="-80" r="4.5"/></g>
      <g transform="rotate(277.5)"><circle cx="0" cy="-80" r="4.5"/></g>
      <g transform="rotate(292.5)"><circle cx="0" cy="-80" r="4.5"/></g>
      <g transform="rotate(307.5)"><circle cx="0" cy="-80" r="4.5"/></g>
      <g transform="rotate(322.5)"><circle cx="0" cy="-80" r="4.5"/></g>
      <g transform="rotate(337.5)"><circle cx="0" cy="-80" r="4.5"/></g>
      <g transform="rotate(352.5)"><circle cx="0" cy="-80" r="4.5"/></g>
    </g>
  </g>

  <!-- Thin neutral border so the white band reads on light backgrounds -->
  <rect x="0.5" y="0.5" width="899" height="599" fill="none" stroke="#CCCCD0" stroke-width="1"/>
</svg>
