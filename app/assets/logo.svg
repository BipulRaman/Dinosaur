<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tile" x1="40" y1="24" x2="216" y2="232" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A78BFA"/>
      <stop offset="0.55" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="gloss" x1="128" y1="24" x2="128" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#4C1D95" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Rounded squircle tile -->
  <g filter="url(#shadow)">
    <rect x="24" y="24" width="208" height="208" rx="58" fill="url(#tile)"/>
  </g>
  <!-- Top gloss highlight -->
  <rect x="24" y="24" width="208" height="120" rx="58" fill="url(#gloss)"/>
  <!-- Subtle inner ring -->
  <rect x="25.5" y="25.5" width="205" height="205" rx="56.5" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="3"/>

  <!-- Spreadsheet / grid glyph -->
  <g>
    <!-- Outer frame -->
    <rect x="74" y="80" width="108" height="96" rx="14" fill="#FFFFFF"/>
    <!-- Header row -->
    <path d="M74 94 C74 86.27 80.27 80 88 80 H168 C175.73 80 182 86.27 182 94 V108 H74 Z" fill="#7C3AED"/>
    <!-- Body cut-outs to form grid (purple gaps) -->
    <rect x="124" y="108" width="8" height="68" fill="#8B5CF6"/>
    <rect x="74" y="138" width="108" height="8" fill="#8B5CF6"/>
    <!-- Header column tick marks -->
    <rect x="92" y="90" width="22" height="8" rx="4" fill="#FFFFFF" fill-opacity="0.85"/>
    <rect x="142" y="90" width="22" height="8" rx="4" fill="#FFFFFF" fill-opacity="0.85"/>
  </g>
</svg>
