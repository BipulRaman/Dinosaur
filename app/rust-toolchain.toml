[toolchain]
# We target the GNU (mingw-w64) Windows ABI. The host triple is NOT pinned here
# because newer rustup (1.28+) rejects a target tuple in the `channel` name
# (`stable-x86_64-pc-windows-gnu`). Plain `cargo` therefore uses the machine's
# default toolchain, while the release packaging script
# (`scripts/package.ps1`) builds explicitly through the GNU toolchain so the
# distributed binary always uses the self-contained mingw linker.
targets = ["x86_64-pc-windows-gnu"]
